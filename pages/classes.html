<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GymSchedular - Classes</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/classes.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23dc3545'><path d='M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29z'/></svg>">
</head>
<body>
  <div class="app-layout" id="app">
    <main class="main-content" id="mainContent"></main>
  </div>

  <script src="../js/utils/storage.js"></script>
  <script src="../js/utils/theme.js"></script>
  <script src="../js/utils/icons.js"></script>
  <script src="../js/utils/data.js"></script>
  <script src="../js/components/sidebar.js"></script>
  <script src="../js/components/toast.js"></script>

  <script>
    if (!UserManager.isLoggedIn()) {
      window.location.href = 'login.html';
    }

    let activeFilter = 'all';

    function setFilter(category, btn) {
      activeFilter = category;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      renderClassCards();
    }

    function renderClassCards() {
      const grid = document.getElementById('classesGrid');
      const filtered = activeFilter === 'all' 
        ? AppData.classes 
        : AppData.classes.filter(c => c.category.toLowerCase() === activeFilter);

      grid.innerHTML = filtered.map((cls, i) => `
        <a href="class-detail.html?id=${cls.id}" class="class-card animate-slide-up" style="animation-delay:${0.05 * (i + 1)}s">
          <div class="class-card-image">
            <img src="${cls.image}" alt="${cls.name}" loading="lazy">
            <span class="badge badge-${cls.category.toLowerCase()}">${cls.category}</span>
            <div class="class-card-level">${cls.level}</div>
          </div>
          <div class="class-card-body">
            <h3>${cls.name}</h3>
            <p class="class-card-instructor">${Icons.user} ${cls.instructor}</p>
            <div class="class-card-meta">
              <span>${Icons.clock} ${cls.duration} min</span>
              <span>${Icons.fire} ${cls.calories} cal</span>
              <span>${Icons.users} ${cls.spots} spots</span>
            </div>
            <div class="class-card-footer">
              <span class="class-time">${Icons.clock} ${cls.time}</span>
              <span class="btn btn-primary btn-sm">View Details</span>
            </div>
          </div>
        </a>
      `).join('');

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">${Icons.classes}</div>
            <h3>No classes found</h3>
            <p>Try a different filter category</p>
          </div>
        `;
      }
    }

    function renderClasses() {
      const app = document.getElementById('app');
      const mainContent = document.getElementById('mainContent');

      const mobileHeaderHTML = createMobileHeader();
      mainContent.insertAdjacentHTML('beforebegin', mobileHeaderHTML);
      app.insertAdjacentHTML('afterbegin', createSidebar('classes'));

      const categories = ['all', 'yoga', 'hiit', 'pilates', 'boxing', 'strength'];

      mainContent.innerHTML = `
        <div class="classes-header fade-in">
          <div>
            <h1>Classes</h1>
            <p class="classes-subtitle">Browse and book your favorite classes</p>
          </div>
          <div style="display:flex;align-items:center;gap:var(--space-3);">
            <div class="view-toggle">
              <button class="view-btn active">${Icons.grid}</button>
              <button class="view-btn">${Icons.list}</button>
            </div>
          </div>
        </div>

        <!-- Search Bar -->
        <div class="classes-search fade-in">
          <div class="search-input-wrap">
            ${Icons.search}
            <input type="text" placeholder="Search classes..." id="searchInput" oninput="handleSearch(this.value)">
          </div>
        </div>

        <!-- Filter Chips -->
        <div class="filter-chips fade-in">
          ${categories.map(cat => `
            <button class="filter-chip ${cat === 'all' ? 'active' : ''}" onclick="setFilter('${cat}', this)">
              ${cat === 'all' ? 'All Classes' : cat.charAt(0).toUpperCase() + cat.slice(1)}
            </button>
          `).join('')}
        </div>

        <!-- Classes Grid -->
        <div class="classes-grid" id="classesGrid"></div>
      `;

      renderClassCards();
      initSidebar();
      ThemeManager.updateToggleUI(ThemeManager.get());
    }

    function handleSearch(query) {
      const grid = document.getElementById('classesGrid');
      const q = query.toLowerCase().trim();
      const filtered = AppData.classes.filter(c => {
        const matchCategory = activeFilter === 'all' || c.category.toLowerCase() === activeFilter;
        const matchSearch = !q || c.name.toLowerCase().includes(q) || c.instructor.toLowerCase().includes(q) || c.category.toLowerCase().includes(q);
        return matchCategory && matchSearch;
      });

      grid.innerHTML = filtered.map((cls, i) => `
        <a href="class-detail.html?id=${cls.id}" class="class-card animate-slide-up" style="animation-delay:${0.05 * (i + 1)}s">
          <div class="class-card-image">
            <img src="${cls.image}" alt="${cls.name}" loading="lazy">
            <span class="badge badge-${cls.category.toLowerCase()}">${cls.category}</span>
            <div class="class-card-level">${cls.level}</div>
          </div>
          <div class="class-card-body">
            <h3>${cls.name}</h3>
            <p class="class-card-instructor">${Icons.user} ${cls.instructor}</p>
            <div class="class-card-meta">
              <span>${Icons.clock} ${cls.duration} min</span>
              <span>${Icons.fire} ${cls.calories} cal</span>
              <span>${Icons.users} ${cls.spots} spots</span>
            </div>
            <div class="class-card-footer">
              <span class="class-time">${Icons.clock} ${cls.time}</span>
              <span class="btn btn-primary btn-sm">View Details</span>
            </div>
          </div>
        </a>
      `).join('');

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">${Icons.classes}</div>
            <h3>No classes found</h3>
            <p>Try a different search term or filter</p>
          </div>
        `;
      }
    }

    renderClasses();
  </script>
</body>
</html>
