<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GymSchedular - Our Gym</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/gym.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23dc3545'><path d='M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29z'/></svg>">
</head>
<body>
  <div class="app-layout" id="app">
    <main class="main-content" id="mainContent"></main>
  </div>

  <script src="../js/utils/storage.js"></script>
  <script src="../js/utils/theme.js"></script>
  <script src="../js/utils/icons.js"></script>
  <script src="../js/utils/data.js"></script>
  <script src="../js/components/sidebar.js"></script>
  <script src="../js/components/toast.js"></script>

  <script>
    if (!UserManager.isLoggedIn()) {
      window.location.href = 'login.html';
    }

    function renderOurGym() {
      const app = document.getElementById('app');
      const mainContent = document.getElementById('mainContent');

      const mobileHeaderHTML = createMobileHeader();
      mainContent.insertAdjacentHTML('beforebegin', mobileHeaderHTML);
      app.insertAdjacentHTML('afterbegin', createSidebar('our-gym'));

      mainContent.innerHTML = `
        <div class="gym-header fade-in">
          <div>
            <h1>Our Gym</h1>
            <p class="gym-subtitle">Explore our world-class facilities and spaces</p>
          </div>
        </div>

        <!-- Gym Stats -->
        <div class="gym-stats fade-in">
          <div class="gym-stat-card">
            <div class="gym-stat-icon">${Icons.mapPin}</div>
            <div class="gym-stat-value">25,000</div>
            <div class="gym-stat-label">Sq. Ft. Facility</div>
          </div>
          <div class="gym-stat-card">
            <div class="gym-stat-icon">${Icons.dumbbell}</div>
            <div class="gym-stat-value">200+</div>
            <div class="gym-stat-label">Equipment Pieces</div>
          </div>
          <div class="gym-stat-card">
            <div class="gym-stat-icon">${Icons.users}</div>
            <div class="gym-stat-value">4</div>
            <div class="gym-stat-label">Dedicated Spaces</div>
          </div>
          <div class="gym-stat-card">
            <div class="gym-stat-icon">${Icons.clock}</div>
            <div class="gym-stat-value">24/7</div>
            <div class="gym-stat-label">Access Hours</div>
          </div>
        </div>

        <!-- Spaces Grid -->
        <div class="spaces-grid">
          ${AppData.spaces.map((space, i) => `
            <div class="space-card animate-slide-up" style="animation-delay:${0.1 * (i + 1)}s">
              <div class="space-card-image">
                <img src="${space.image}" alt="${space.name}" loading="lazy">
                <div class="space-card-overlay">
                  <h3>${space.name}</h3>
                  <p>${space.description}</p>
                </div>
              </div>
              <div class="space-card-body">
                <div class="space-card-tags">
                  ${(space.features || space.tags || []).map(f => `<span class="space-tag">${f}</span>`).join('')}
                </div>
                <div class="space-card-footer">
                  <span class="space-capacity">${Icons.users} Capacity: ${space.capacity}</span>
                  <button class="btn btn-outline btn-sm" onclick="window.location.href='classes.html'">View Classes</button>
                </div>
              </div>
            </div>
          `).join('')}
        </div>

        <!-- Amenities Section -->
        <div class="amenities-section card fade-in">
          <h3 class="section-title">Amenities & Services</h3>
          <div class="amenities-grid">
            <div class="amenity-item">
              <div class="amenity-icon">${Icons.check}</div>
              <span>Free Parking</span>
            </div>
            <div class="amenity-item">
              <div class="amenity-icon">${Icons.check}</div>
              <span>Locker Rooms</span>
            </div>
            <div class="amenity-item">
              <div class="amenity-icon">${Icons.check}</div>
              <span>Showers & Towels</span>
            </div>
            <div class="amenity-item">
              <div class="amenity-icon">${Icons.check}</div>
              <span>Juice Bar</span>
            </div>
            <div class="amenity-item">
              <div class="amenity-icon">${Icons.check}</div>
              <span>Pro Shop</span>
            </div>
            <div class="amenity-item">
              <div class="amenity-icon">${Icons.check}</div>
              <span>WiFi Access</span>
            </div>
            <div class="amenity-item">
              <div class="amenity-icon">${Icons.check}</div>
              <span>Personal Training</span>
            </div>
            <div class="amenity-item">
              <div class="amenity-icon">${Icons.check}</div>
              <span>Childcare</span>
            </div>
          </div>
        </div>

        <!-- Hours Section -->
        <div class="hours-section card fade-in">
          <h3 class="section-title">Operating Hours</h3>
          <div class="hours-grid">
            <div class="hours-item">
              <span class="hours-day">Monday - Friday</span>
              <span class="hours-time">5:00 AM - 11:00 PM</span>
            </div>
            <div class="hours-item">
              <span class="hours-day">Saturday</span>
              <span class="hours-time">6:00 AM - 10:00 PM</span>
            </div>
            <div class="hours-item">
              <span class="hours-day">Sunday</span>
              <span class="hours-time">7:00 AM - 9:00 PM</span>
            </div>
            <div class="hours-item highlight">
              <span class="hours-day">Premium Members</span>
              <span class="hours-time">24/7 Key Card Access</span>
            </div>
          </div>
        </div>
      `;

      initSidebar();
      ThemeManager.updateToggleUI(ThemeManager.get());
    }

    renderOurGym();
  </script>
</body>
</html>
