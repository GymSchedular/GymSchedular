<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GymSchedular - Book a Class</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/book-class.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23dc3545'><path d='M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29z'/></svg>">
</head>
<body>
  <div class="app-layout" id="app">
    <main class="main-content" id="mainContent"></main>
  </div>

  <script src="../js/utils/storage.js"></script>
  <script src="../js/utils/theme.js"></script>
  <script src="../js/utils/icons.js"></script>
  <script src="../js/utils/data.js"></script>
  <script src="../js/components/sidebar.js"></script>
  <script src="../js/components/toast.js"></script>

  <script>
    if (!UserManager.isLoggedIn()) {
      window.location.href = 'login.html';
    }

    let currentStep = 1;
    let selectedClass = null;
    let selectedDate = null;
    let selectedTime = null;

    const timeSlots = ['6:00 AM', '7:00 AM', '8:00 AM', '9:00 AM', '10:30 AM', '12:00 PM', '2:00 PM', '4:00 PM', '5:30 PM', '7:00 PM'];
    const dates = [];
    const today = new Date();
    for (let i = 0; i < 7; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() + i);
      dates.push({
        label: i === 0 ? 'Today' : i === 1 ? 'Tomorrow' : d.toLocaleDateString('en-US', { weekday: 'short' }),
        date: d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
        full: d.toISOString().split('T')[0]
      });
    }

    function goToStep(step) {
      if (step === 2 && !selectedClass) {
        showToast('Please select a class first', 'error');
        return;
      }
      if (step === 3 && (!selectedDate || !selectedTime)) {
        showToast('Please select a date and time', 'error');
        return;
      }
      currentStep = step;
      renderStepContent();
      updateStepIndicator();
    }

    function selectClass(cls, el) {
      selectedClass = cls;
      document.querySelectorAll('.class-select-card').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
    }

    function selectDate(date, el) {
      selectedDate = date;
      document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
    }

    function selectTime(time, el) {
      selectedTime = time;
      document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
      el.classList.add('selected');
    }

    function updateStepIndicator() {
      document.querySelectorAll('.step').forEach((s, i) => {
        s.classList.remove('active', 'completed');
        if (i + 1 === currentStep) s.classList.add('active');
        if (i + 1 < currentStep) s.classList.add('completed');
      });
    }

    function confirmBooking() {
      if (!selectedClass || !selectedDate || !selectedTime) return;

      BookingManager.addBooking({
        classId: selectedClass.id,
        className: selectedClass.name,
        instructor: selectedClass.instructor,
        time: selectedTime,
        duration: selectedClass.duration + ' min',
        date: selectedDate.full
      });

      const bookingId = '#FS-' + Math.random().toString(36).substring(2, 8).toUpperCase();

      showToast(`Successfully booked ${selectedClass.name}!`, 'success');

      // Show success state with QR code
      const content = document.getElementById('stepContent');
      content.innerHTML = `
        <div class="booking-success fade-in">
          <div class="success-icon">${Icons.checkCircle}</div>
          <h2>Booking Confirmed!</h2>
          <p>You're set for <strong>${selectedClass.name}</strong> on ${selectedDate.date} at ${selectedTime}</p>

          <div class="qr-section">
            <canvas id="qrCanvas" width="180" height="180"></canvas>
            <span class="qr-label">Scan at check-in</span>
            <span class="booking-id">${bookingId}</span>
          </div>

          <div class="success-actions" style="margin-bottom: var(--space-4);">
            <button class="btn btn-outline btn-sm" onclick="saveQR()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
              Save
            </button>
            <button class="btn btn-outline btn-sm" onclick="shareBooking('${bookingId}')">
              ${Icons.share} Share
            </button>
          </div>

          <div class="booking-details-table">
            <div class="detail-row"><span class="detail-label">Class</span><span class="detail-value">${selectedClass.name}</span></div>
            <div class="detail-row"><span class="detail-label">Instructor</span><span class="detail-value">${selectedClass.instructor}</span></div>
            <div class="detail-row"><span class="detail-label">Date & Time</span><span class="detail-value">${selectedDate.date} at ${selectedTime}</span></div>
            <div class="detail-row"><span class="detail-label">Location</span><span class="detail-value">${selectedClass.location}</span></div>
            <div class="detail-row"><span class="detail-label">Booking ID</span><span class="detail-value">${bookingId}</span></div>
          </div>

          <div class="success-actions">
            <a href="dashboard.html" class="btn btn-primary">Go to Dashboard</a>
            <button class="btn btn-outline" onclick="resetBooking()">Browse More</button>
          </div>
        </div>
      `;

      generateQR('qrCanvas', bookingId);
    }

    function resetBooking() {
      currentStep = 1;
      selectedClass = null;
      selectedDate = null;
      selectedTime = null;
      renderStepContent();
      updateStepIndicator();
    }

    function renderStepContent() {
      const content = document.getElementById('stepContent');

      if (currentStep === 1) {
        content.innerHTML = `
          <h2 class="step-title">Select a Class</h2>
          <p class="step-subtitle">Choose from our available classes</p>
          <div class="class-select-grid">
            ${AppData.classes.map(cls => `
              <div class="class-select-card ${selectedClass && selectedClass.id === cls.id ? 'selected' : ''}" 
                   onclick="selectClass(AppData.classes.find(c=>c.id===${cls.id}), this)">
                <img src="${cls.image}" alt="${cls.name}" loading="lazy">
                <div class="class-select-info">
                  <span class="badge badge-${cls.category.toLowerCase()} badge-sm">${cls.category}</span>
                  <h4>${cls.name}</h4>
                  <p>${Icons.user} ${cls.instructor}</p>
                  <div class="class-select-meta">
                    <span>${Icons.clock} ${cls.duration} min</span>
                    <span>${Icons.fire} ${cls.calories} cal</span>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
          <div class="step-actions">
            <div></div>
            <button class="btn btn-primary" onclick="goToStep(2)">Continue ${Icons.chevronRight}</button>
          </div>
        `;
      } else if (currentStep === 2) {
        content.innerHTML = `
          <h2 class="step-title">Choose Date & Time</h2>
          <p class="step-subtitle">Select when you'd like to attend <strong>${selectedClass.name}</strong></p>
          
          <div class="date-selector">
            <h4>Select Date</h4>
            <div class="date-grid">
              ${dates.map((d, i) => `
                <button class="date-btn ${selectedDate && selectedDate.full === d.full ? 'active' : ''}" 
                        onclick="selectDate(dates[${i}], this)">
                  <span class="date-label">${d.label}</span>
                  <span class="date-value">${d.date}</span>
                </button>
              `).join('')}
            </div>
          </div>

          <div class="time-selector">
            <h4>Available Times</h4>
            <div class="time-grid">
              ${timeSlots.map(t => `
                <button class="time-slot ${selectedTime === t ? 'selected' : ''}" 
                        onclick="selectTime('${t}', this)">
                  ${t}
                </button>
              `).join('')}
            </div>
          </div>

          <div class="step-actions">
            <button class="btn btn-outline" onclick="goToStep(1)">${Icons.arrowLeft} Back</button>
            <button class="btn btn-primary" onclick="goToStep(3)">Continue ${Icons.chevronRight}</button>
          </div>
        `;
      } else if (currentStep === 3) {
        content.innerHTML = `
          <h2 class="step-title">Confirm Booking</h2>
          <p class="step-subtitle">Review your booking details</p>

          <div class="booking-summary">
            <div class="summary-card">
              <div class="summary-class">
                <img src="${selectedClass.image}" alt="${selectedClass.name}" loading="lazy">
                <div class="summary-class-info">
                  <span class="badge badge-${selectedClass.category.toLowerCase()} badge-sm">${selectedClass.category}</span>
                  <h3>${selectedClass.name}</h3>
                  <p>${Icons.user} ${selectedClass.instructor}</p>
                </div>
              </div>
              <div class="summary-details">
                <div class="summary-detail-row">
                  <span class="summary-label">${Icons.clock} Date</span>
                  <span class="summary-value">${selectedDate.date}</span>
                </div>
                <div class="summary-detail-row">
                  <span class="summary-label">${Icons.clock} Time</span>
                  <span class="summary-value">${selectedTime}</span>
                </div>
                <div class="summary-detail-row">
                  <span class="summary-label">${Icons.fire} Duration</span>
                  <span class="summary-value">${selectedClass.duration} min</span>
                </div>
                <div class="summary-detail-row">
                  <span class="summary-label">${Icons.mapPin} Location</span>
                  <span class="summary-value">${selectedClass.location}</span>
                </div>
              </div>
              <div class="summary-note">
                <p>${Icons.check} Free cancellation up to 2 hours before class</p>
              </div>
            </div>
          </div>

          <div class="step-actions">
            <button class="btn btn-outline" onclick="goToStep(2)">${Icons.arrowLeft} Back</button>
            <button class="btn btn-primary btn-lg" onclick="confirmBooking()">${Icons.check} Confirm Booking</button>
          </div>
        `;
      }
    }

    function renderBookClass() {
      const app = document.getElementById('app');
      const mainContent = document.getElementById('mainContent');

      const mobileHeaderHTML = createMobileHeader();
      mainContent.insertAdjacentHTML('beforebegin', mobileHeaderHTML);
      app.insertAdjacentHTML('afterbegin', createSidebar('book-class'));

      mainContent.innerHTML = `
        <div class="book-header fade-in">
          <div>
            <h1>Book a Class</h1>
            <p class="book-subtitle">Reserve your spot in just a few steps</p>
          </div>
        </div>

        <!-- Step Indicator -->
        <div class="step-indicator fade-in">
          <div class="step active" data-step="1">
            <div class="step-number">1</div>
            <div class="step-label">Select Class</div>
          </div>
          <div class="step-line"></div>
          <div class="step" data-step="2">
            <div class="step-number">2</div>
            <div class="step-label">Choose Time</div>
          </div>
          <div class="step-line"></div>
          <div class="step" data-step="3">
            <div class="step-number">3</div>
            <div class="step-label">Confirm</div>
          </div>
        </div>

        <!-- Step Content -->
        <div id="stepContent" class="step-content"></div>
      `;

      renderStepContent();
      initSidebar();
      ThemeManager.updateToggleUI(ThemeManager.get());
    }

    // Simple QR code generator using canvas
    function generateQR(canvasId, data) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const size = canvas.width;
      const modules = 25;
      const cellSize = size / modules;
      const margin = 2;

      // Use data hash to create a deterministic pattern
      let hash = 0;
      for (let i = 0; i < data.length; i++) {
        hash = ((hash << 5) - hash) + data.charCodeAt(i);
        hash |= 0;
      }

      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, size, size);
      ctx.fillStyle = '#000000';

      // Finder patterns (3 corners)
      function drawFinder(x, y) {
        for (let r = 0; r < 7; r++) {
          for (let c = 0; c < 7; c++) {
            const isBorder = r === 0 || r === 6 || c === 0 || c === 6;
            const isInner = r >= 2 && r <= 4 && c >= 2 && c <= 4;
            if (isBorder || isInner) {
              ctx.fillRect((x + c) * cellSize, (y + r) * cellSize, cellSize, cellSize);
            }
          }
        }
      }

      drawFinder(margin, margin);
      drawFinder(modules - 7 - margin, margin);
      drawFinder(margin, modules - 7 - margin);

      // Data modules (deterministic from hash)
      let seed = Math.abs(hash);
      function nextRand() {
        seed = (seed * 1103515245 + 12345) & 0x7fffffff;
        return seed;
      }

      for (let r = 0; r < modules; r++) {
        for (let c = 0; c < modules; c++) {
          // Skip finder pattern areas
          const inTL = r < 9 + margin && c < 9 + margin;
          const inTR = r < 9 + margin && c > modules - 9 - margin;
          const inBL = r > modules - 9 - margin && c < 9 + margin;
          if (inTL || inTR || inBL) continue;

          if (nextRand() % 3 !== 0) {
            ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
          }
        }
      }
    }

    function saveQR() {
      const canvas = document.getElementById('qrCanvas');
      if (!canvas) return;
      const link = document.createElement('a');
      link.download = 'gymschedular-booking-qr.png';
      link.href = canvas.toDataURL();
      link.click();
    }

    function shareBooking(id) {
      if (navigator.share) {
        navigator.share({ title: 'GymSchedular Booking', text: 'My booking ' + id });
      } else {
        navigator.clipboard.writeText('GymSchedular Booking: ' + id).then(() => {
          showToast('Booking ID copied to clipboard!', 'success');
        });
      }
    }

    renderBookClass();
  </script>
</body>
</html>
